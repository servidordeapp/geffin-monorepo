services:
  # ─── API Core (Laravel) ──────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api-laravel
      dockerfile: Dockerfile
    container_name: gfn_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../../apps/api-laravel:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gfn
      DB_USERNAME: gfn
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: gfn
      RABBITMQ_PASSWORD: secret
      RABBITMQ_VHOST: /
      FILESYSTEM_DISK: minio
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: gfn
      AWS_SECRET_ACCESS_KEY: secret123
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: gfn
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gfn

  nginx:
    image: nginx:alpine
    container_name: gfn_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ../../apps/api-laravel:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - gfn

  # ─── Platform: PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gfn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gfn
      POSTGRES_USER: gfn
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../platform/database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gfn -d gfn"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gfn

  # ─── Platform: Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gfn_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ../../platform/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gfn

  # ─── Platform: RabbitMQ ──────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gfn_rabbitmq
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ../../platform/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ../../platform/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gfn

  # ─── Platform: MinIO ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gfn_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gfn
      MINIO_ROOT_PASSWORD: secret123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gfn

  # ─── Dev Tools ───────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: gfn_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - gfn

  # ─── Workers (profile: worker) ───────────────────────────────────────────────
  queue:
    build:
      context: ../../apps/api-laravel
      dockerfile: Dockerfile
    container_name: gfn_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../../apps/api-laravel:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gfn
      DB_USERNAME: gfn
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: gfn
      RABBITMQ_PASSWORD: secret
    depends_on:
      - api
      - rabbitmq
    networks:
      - gfn
    profiles:
      - worker

networks:
  gfn:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
