name: geffin

# ─────────────────────────────────────────────────────────────────────────────
# Geffin — local cloud-native stack
#
# Services:
#   api      → Laravel (PHP-FPM)
#   web      → Nginx reverse proxy (8080 → api:9000)
#   mysql    → MySQL 8.x (primary datastore)
#   mailpit  → SMTP catcher + UI (smtp:1025, ui:8025)
# ─────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: ${APP_URL:-http://localhost:8080}
  LOG_CHANNEL: stack

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-geffin}
  DB_USERNAME: ${DB_USERNAME:-geffin}
  DB_PASSWORD: ${DB_PASSWORD:-secret}

  CACHE_STORE: database
  SESSION_DRIVER: database
  QUEUE_CONNECTION: database

  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  MAIL_USERNAME: null
  MAIL_PASSWORD: null
  MAIL_ENCRYPTION: null
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@geffin.local}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Geffin}

services:
  assets:
    image: node:24-alpine
    container_name: geffin-assets
    working_dir: /app
    volumes:
      - ../../laravel:/app
      - public_build:/app/public/build
    command: sh -c "npm ci && npm run build"

  api:
    build:
      context: ../../laravel
      dockerfile: Dockerfile
      target: runtime
    image: geffin/api:local
    container_name: geffin-api
    restart: unless-stopped
    environment:
      <<: *app-env
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
    volumes:
      - ../../laravel:/var/www/html
      - vendor:/var/www/html/vendor
      - public_build:/var/www/html/public/build:ro
      - ../../laravel/storage:/var/www/html/storage
    depends_on:
      assets:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks: [geffin]
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: geffin-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../laravel/public:/var/www/html/public:ro
      - public_build:/var/www/html/public/build:ro
    depends_on:
      assets:
        condition: service_completed_successfully
      api:
        condition: service_started
    networks: [geffin]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8.4
    container_name: geffin-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --authentication-policy=caching_sha2_password
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-geffin}
      MYSQL_USER:          ${DB_USERNAME:-geffin}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_PORT_HOST:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [geffin]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: geffin-mailpit
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks: [geffin]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  geffin:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  vendor:
  public_build:
