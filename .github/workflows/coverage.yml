name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-coverage:
    name: Laravel — tests + coverage (>= ${{ vars.COVERAGE_MIN || '90' }}%)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: laravel

    env:
      COVERAGE_MIN: ${{ vars.COVERAGE_MIN || '90' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4 with pcov
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, gd, intl, mbstring, opcache, pcntl, pdo_sqlite, zip, pcov
          coverage: pcov
          tools: composer:v2
          ini-values: memory_limit=512M

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: laravel/vendor
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('laravel/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php8.4-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare app environment
        run: |
          cp .env.example .env 2>/dev/null || true
          php artisan key:generate --ansi

      - name: Run tests with coverage (fail under ${{ env.COVERAGE_MIN }}%)
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test --coverage --min=${{ env.COVERAGE_MIN }}
