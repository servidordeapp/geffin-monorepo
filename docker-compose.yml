services:
  app:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gfn_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gfn
      DB_USERNAME: gfn
      DB_PASSWORD: secret
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gfn

  nginx:
    image: nginx:alpine
    container_name: gfn_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gfn

  postgres:
    image: postgres:16-alpine
    container_name: gfn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gfn
      POSTGRES_USER: gfn
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gfn -d gfn"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gfn

  redis:
    image: redis:7-alpine
    container_name: gfn_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gfn

  mailpit:
    image: axllent/mailpit:latest
    container_name: gfn_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - gfn

  queue:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gfn_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: gfn
      DB_USERNAME: gfn
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - app
    networks:
      - gfn
    profiles:
      - worker

networks:
  gfn:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
